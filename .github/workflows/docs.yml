name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [initial, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── VitePress (가이드 문서) ──────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Docs~/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci
        working-directory: Docs~

      - name: Build VitePress site
        run: npm run build
        working-directory: Docs~

      - name: Add .nojekyll
        run: touch Docs~/.vitepress/dist/.nojekyll

      # ── DocFX (API 레퍼런스) ────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Restore NuGet packages
        working-directory: docfx/src
        run: dotnet restore AchEngine.csproj

      - name: Generate DocFX metadata
        working-directory: docfx
        run: docfx metadata docfx.json

      - name: Build DocFX site
        working-directory: docfx
        run: docfx build docfx.json

      # DocFX HTML에 커스텀 CSS 주입 (VitePress 테마 통일)
      - name: Inject custom theme into DocFX output
        run: |
          find docfx/_site -name "*.html" -exec sed -i \
            's|</head>|<link rel="stylesheet" href="/AchEngine/api/styles/achengine.css"></head>|' {} \;

      # DocFX 결과물을 VitePress 산출물의 /api/ 하위에 병합
      - name: Merge API docs into site
        run: |
          mkdir -p Docs~/.vitepress/dist/api
          cp -r docfx/_site/. Docs~/.vitepress/dist/api/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Docs~/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
