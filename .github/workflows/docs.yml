name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [initial, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Node (Docusaurus) ───────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      # ── .NET + DocFX (API 메타데이터만 생성, HTML 빌드는 안 함) ──
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Restore NuGet packages
        working-directory: docfx~/src
        run: dotnet restore AchEngine.csproj

      - name: Generate DocFX metadata
        working-directory: docfx~
        run: docfx metadata docfx.json

      # ── Docusaurus 빌드 (gen-api.mjs 가 DocFX YAML → Markdown) ──
      - name: Install Docusaurus dependencies
        run: npm install --no-audit --no-fund
        working-directory: Docs~

      - name: Build Docusaurus site
        run: npm run build
        working-directory: Docs~

      - name: Add .nojekyll
        run: touch Docs~/build/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Docs~/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
